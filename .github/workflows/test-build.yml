name: Test Build (debug APK, no release)

# Private test build for verifying fixes on a real device.
# - Triggers ONLY on workflow_dispatch and pushes to test/** branches — NEVER on main.
# - Builds the arm64 GMS *debug* APK (auto-signed with the Android debug key; no release keystore needed).
# - Uploads the APK as a workflow artifact only.
# - Sends NO Discord/Telegram notifications and creates NO GitHub Release — it cannot reach the community.

on:
  workflow_dispatch:
  push:
    branches:
      - 'test/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-testbuild-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-testbuild-
            ${{ runner.os }}-gradle-

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

      # No google-services.json step: the GMS debug variant builds fine without it (verified), and
      # there is no GOOGLE_SERVICES_JSON secret — the step was dead and only produced an editor lint hint.

      - name: Ensure Android debug keystore (CI runner has none)
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v -keystore ~/.android/debug.keystore \
              -storepass android -keypass android -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
            echo "Generated standard Android debug keystore."
          fi

      - name: Build arm64 GMS debug APK
        run: ./gradlew assembleArm64GmsDebug --console=plain

      - name: Rename APK
        run: |
          mkdir -p app/build/outputs/apk/test-artifacts
          APK=$(find app/build/outputs/apk/arm64Gms/debug -name "*.apk" | head -n 1)
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          cp "$APK" "app/build/outputs/apk/test-artifacts/Aura-Hi-Res-TEST-${SHORT_SHA}.apk"
          echo "Test APK: Aura-Hi-Res-TEST-${SHORT_SHA}.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Aura-Hi-Res-TEST-debug
          path: app/build/outputs/apk/test-artifacts/*.apk
          retention-days: 14
